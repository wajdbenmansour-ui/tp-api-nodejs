# Nom du workflow (affiché dans l'interface GitHub)
name: CI - Tests

# ============================================
# DÉCLENCHEURS
# ============================================
# Ce workflow se lance automatiquement dans deux cas :
on:
  push:
    branches: [ main ]          # À chaque push sur main
  pull_request:
    branches: [ main ]          # À chaque PR ciblant main

# ============================================
# JOBS
# ============================================
jobs:
  tests:
    # Type de machine virtuelle (runner)
    runs-on: ubuntu-latest

    # ============================================
    # ÉTAPES DU JOB
    # ============================================
    steps:
      # Étape 1 : Récupérer le code source
      - name: 📥 Checkout du code
        uses: actions/checkout@v4
        # actions/checkout clone votre dépôt sur le runner

      # Étape 2 : Installer Node.js
      - name: 🟢 Installer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # cache: 'npm' met en cache node_modules entre les runs
          # pour accélérer les builds suivants

      # Étape 3 : Installer les dépendances
      - name: 📦 Installer les dépendances
        run: npm ci
        # npm ci est préférable à npm install en CI :
        # il installe EXACTEMENT les versions du package-lock.json
        # et est plus rapide et plus reproductible

      # Étape 4 : Lancer les tests
      - name: 🧪 Lancer les tests
        run: npm test